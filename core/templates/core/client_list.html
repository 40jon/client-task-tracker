<!DOCTYPE html>
<html>
<head>
    <title>Clients</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input {
            display: block;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #999;
            font-size: 16px;
            background: white;
            color: black;
        }

        button {
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
            margin-right: 8px;
        }

        li {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Client List</h1>

    <form id="client-form" method="post">
        {% csrf_token %}
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="company" placeholder="Company" required>
        <button type="submit">Add Client</button>
    </form>

    <ul id="client-list"></ul>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function loadClients() {
            fetch('/api/clients/')
                .then(response => response.json())
                .then(data => {
                    const clientList = document.getElementById('client-list');
                    clientList.innerHTML = '';

                    data.forEach(client => {
                        const li = document.createElement('li');
                        li.textContent = `${client.name} - ${client.email} - ${client.company} `;

                        const editBtn = document.createElement('button');
                        editBtn.textContent = 'Edit';

                        editBtn.addEventListener('click', function () {
                            const newName = prompt('Enter new name:', client.name);
                            const newEmail = prompt('Enter new email:', client.email);
                            const newCompany = prompt('Enter new company:', client.company);

                            if (newName && newEmail && newCompany) {
                                const csrftoken = getCookie('csrftoken');

                                fetch(`/api/clients/${client.id}/`, {
                                    method: 'PATCH',
                                    credentials: 'same-origin',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'X-CSRFToken': csrftoken
                                    },
                                    body: JSON.stringify({
                                        name: newName,
                                        email: newEmail,
                                        company: newCompany
                                    })
                                })
                                .then(response => {
                                    if (!response.ok) {
                                        throw new Error('Failed to update client');
                                    }
                                    return response.json();
                                })
                                .then(data => {
                                    loadClients();
                                })
                                .catch(error => {
                                    console.error('Error updating client:', error);
                                });
                            }
                        });

                        const deleteBtn = document.createElement('button');
                        deleteBtn.textContent = 'Delete';

                        deleteBtn.addEventListener('click', function () {
                            const csrftoken = getCookie('csrftoken');

                            fetch(`/api/clients/${client.id}/`, {
                                method: 'DELETE',
                                credentials: 'same-origin',
                                headers: {
                                    'X-CSRFToken': csrftoken
                                }
                            })
                            .then(response => {
                                if (!response.ok) {
                                    throw new Error('Failed to delete client');
                                }
                                loadClients();
                            })
                            .catch(error => {
                                console.error('Error deleting client:', error);
                            });
                        });

                        li.appendChild(editBtn);
                        li.appendChild(deleteBtn);
                        clientList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error('Error fetching clients:', error);
                });
        }

        document.getElementById('client-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const csrftoken = getCookie('csrftoken');

            fetch('/api/clients/', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    company: document.getElementById('company').value
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to create client');
                }
                return response.json();
            })
            .then(data => {
                document.getElementById('client-form').reset();
                loadClients();
            })
            .catch(error => {
                console.error('Error creating client:', error);
            });
        });

        loadClients();
    </script>
</body>
</html>
